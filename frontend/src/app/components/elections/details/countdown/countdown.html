<label>DURATION:</label>

<div class="timer-box">
<div class="time">
    <input type="number" class="timer-input" [(ngModel)]="hours" min="0" step="1" (change)="onHoursChange(hours)">
    <small>HOURS</small>
</div>

<div class="divider"></div>

<div class="time">
    <input type="number" class="timer-input" [(ngModel)]="minutes" min="0" step="1" (change)="onMinutesChange(minutes)">
    <small>MINUTES</small>
</div>

<div class="divider"></div>

<div class="time">
    <input type="number" class="timer-input" [(ngModel)]="seconds" min="0" step="1" (change)="onSecondsChange(seconds)">
    <small>SECONDS</small>
</div>
</div>
