<!-- Active Elections -->
<div class="section" *ngIf="selectedFilter === 'active' && activeElections.length > 0">
    <app-election-card
    *ngFor="let election of activeElections"
    [election]="election"
    status="active"
    [showVoteButton]="true"
    (click)="openElection(election.id, election.status, election.created_by)">
  </app-election-card>
</div>

<!-- Upcoming Elections -->
<div class="section" *ngIf="selectedFilter === 'pending' && upcomingElections.length > 0">
    <app-election-card
    *ngFor="let election of upcomingElections"
    [election]="election"
    status="pending"
    (click)="openElection(election.id, election.status, election.created_by)">
  </app-election-card>
</div>

<!-- Ended Elections -->
<div class="section" *ngIf="selectedFilter === 'ended' && endedElections.length > 0">
    <app-election-card
    *ngFor="let election of endedElections"
    [election]="election"
    status="ended"
    (click)="openElection(election.id, election.status, election.created_by)">
  </app-election-card>
</div>

<!-- All Elections -->
<div class="all-section" *ngIf="selectedFilter === 'all'">
  <div class="section" *ngIf="activeElections.length > 0">
    <app-election-card
    *ngFor="let election of activeElections"
    [election]="election"
    status="active"
    [showVoteButton]="true"
    (click)="openElection(election.id, election.status, election.created_by)">
  </app-election-card>
  </div>
  <div class="section" *ngIf="upcomingElections.length > 0">
        <app-election-card
    *ngFor="let election of upcomingElections"
    [election]="election"
    status="pending"
    (click)="openElection(election.id, election.status, election.created_by)">
  </app-election-card>
  </div>
  <div class="section" *ngIf="endedElections.length > 0">

        <app-election-card
    *ngFor="let election of endedElections"
    [election]="election"
    status="ended"
    (click)="openElection(election.id, election.status, election.created_by)">
  </app-election-card>
  </div>
</div>

<!-- Empty State -->
<div class="empty-state" *ngIf="isEmpty">
  <h3>No Elections Available</h3>
  <p>There are currently no elections to display.</p>
  <button *ngIf="isAdmin" class="btn btn-primary" routerLink="/admin/elections/create">
    Create New Election
  </button>
</div>
