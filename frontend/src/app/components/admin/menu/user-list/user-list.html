<div class="user-list-container">
    <div class="user-header">
        <span>Users</span>
        <div class="configs">
            <div class="icon-list">
                <img class='user-icon add' [src]="assetPath + 'add.svg'" alt="">
                <img class='user-icon 3dots' [src]="assetPath + '3dots.png'" alt="">
            </div>
        </div>
    </div>

    <div class="search-bar">
    <input type="search" placeholder="Search by Id or Title">
    </div>

    <div class="user-list">
        <app-user-card [user]="user" *ngFor="let user of userFacade.users$ | async" (userSelected)="showUserSelected($event)"></app-user-card>
    </div>
</div>
