<nav class="navbar">
  <div class="nav-container">
    <div class="nav-brand" routerLink="/">
      <img src="../../../assets/logo.png" alt="Logo" class="logo"/>
      <span class="brand-name">InfinityVote</span>
      <button class="btn-create light-fade-bg"  *ngIf="isAdmin" routerLink="admin/dashboard/" >Permissions</button> 
      <button class="btn-create light-fade-bg" *ngIf="currentUser?.can_create_election" 
      routerLink="/admin/elections/create" >Create Election</button>
    </div>

    <button class="nav-toggle" (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="nav-menu" [class.active]="isMenuOpen">

    
    <!-- Message display at the top -->
<div *ngIf="joinSuccess !== null" class="join-message" [ngClass]="{'success': joinSuccess, 'error': !joinSuccess}">
  {{ joinMessage }}
</div>

  <!-- Join form -->
  <div class="join-box">
    <input
      type="text"
      placeholder="Type Election Id..."
      [(ngModel)]="joinElectionId"
      name="joinElectionId"
      class="light-fade-bg"
    />
    <button type="button" class="light-fade-bg" (click)="joinElection()">Join</button>
  </div>
      
      <div class="nav-user">
        <div class="user-cont">
        <span class="user-name">{{ currentUser?.username }}</span>
        <span class="user-role" [class.admin]="isAdmin">{{ currentUser?.role }}</span>
        </div>
        <img 
          src="../../../assets/logout.png" 
          alt="Logout" 
          class="btn-logout" 
          (click)="logout()" />
      </div>
    </div>
  </div>
</nav>
