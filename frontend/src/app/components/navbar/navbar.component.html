<nav class="navbar">
  <div class="nav-container">
    <div class="nav-brand" routerLink="/">
      <img src="../../../assets/logo.png" alt="Logo" class="logo"/>
      <span class="brand-name">InfinityVote</span>
      <button class="btn-create light-fade-bg" *ngIf="isAdmin" 
      routerLink="/admin/elections/create" >Create Election</button>
    </div>

    <button class="nav-toggle" (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="nav-menu" [class.active]="isMenuOpen">

            
      <form action="/join" method="get" class="join-box">
        <input class="light-fade-bg" type="text" name="q" placeholder="Type Election Id..." />
        <button class="light-fade-bg" type="submit">Join</button>
      </form>
      
      <div class="nav-user">
        <div class="user-cont">
        <span class="user-name">{{ currentUser?.username }}</span>
        <span class="user-role" [class.admin]="isAdmin">{{ currentUser?.role }}</span>
        </div>
        <img 
          src="../../../assets/logout.png" 
          alt="Logout" 
          class="btn-logout" 
          (click)="logout()" />
      </div>
    </div>
  </div>
</nav>
