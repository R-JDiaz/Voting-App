<!-- vote-result-modal.component.html -->
<div class="modal-overlay" *ngIf="show">
  <div class="modal-content">
    <h1>Election Results</h1>

    <div *ngIf="hasVotes; else noVotes">
      <div *ngFor="let pos of results" class="position-box">
        <h2>{{ pos.position_name }}</h2>
        <ul>
          <li *ngFor="let cand of pos.candidates">
            {{ cand.candidate_name }} 
            <span *ngIf="cand.votes_count !== undefined">
              - {{ cand.votes_count }} votes
            </span>
          </li>
        </ul>
      </div>
    </div>

    <ng-template #noVotes>
      <p>No votes were cast. Showing candidates:</p>
      <div *ngFor="let pos of results" class="position-box">
        <h2>{{ pos.position_name }}</h2>
        <ul>
          <li *ngFor="let cand of pos.candidates">
            {{ cand.candidate_name }}
          </li>
        </ul>
      </div>
    </ng-template>

    <button class="close-btn" routerLink="/admin/elections" (click)="show = false">Close</button>
  </div>
</div>
