<!-- Overlay for modal with background blur -->
<!-- Modal overlay -->
<app-navbar></app-navbar>
<div class="modal-overlay" (click)="closeModal()">
  
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h2>Edit Election</h2>
    
  <button type="button" class="btn btn-secondary" (click)="deleteElection()">
    Delete Election
  </button>
  <button 
  type="button" 
  class="btn btn-secondary" 
  [disabled]="electionForm.value.status !== 'ended'"
  (click)="showResults()">
  View Results
  </button>

    <form [formGroup]="electionForm" (ngSubmit)="submit()">

      <div class="form-group">
        <label id="elec-id"> ID: {{ electionDetails?.id }}</label>
        <label>Title</label>
        <input formControlName="title" type="text" class="form-control">
      </div>
      <div class="vote-count">
        Users voted: {{ totalVotes }}
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea formControlName="description" class="form-control"></textarea>
      </div>

      <div class="form-group">
        <label>Countdown (seconds)</label>
        <input formControlName="countdown" type="number" class="form-control">
      </div>

      <div class="form-group">
        <label>Status</label>
        <select formControlName="status" class="form-control">
          <option value="pending">Pending</option>
          <option value="active">Active</option>
          <option value="ended">Ended</option>
        </select>
      </div>


      <div formArrayName="positions">
        <div *ngFor="let pos of positions.controls; let i=index" [formGroupName]="i" class="position-card">
          <div class="position-header">
            <h3>Position {{ i + 1 }}</h3>
            <button type="button" class="remove-btn" (click)="removePosition(i)">Remove</button>
          </div>

          <div class="form-group">
            <label>Name</label>
            <input formControlName="name" type="text" class="form-control" [class.is-invalid]="error?.includes('position') || error?.includes('candidate')">
          </div>

          <div class="form-group">
            <label>Description</label>
            <input formControlName="description" type="text" class="form-control">
          </div>

          <div formArrayName="candidates">
            <div *ngFor="let cand of candidates(i).controls; let j=index" [formGroupName]="j" class="candidate-card">
              <label>Candidate {{ j + 1 }}</label>
              <input formControlName="name" type="text" class="form-control" [class.is-invalid]="error?.includes('position') || error?.includes('candidate')">
              <button type="button" class="remove-btn" (click)="removeCandidate(i,j)">Remove</button>
            </div>
            <button type="button" class="add-btn" (click)="addCandidate(i)">Add Candidate</button>
          </div>

        </div>
        <button type="button" class="add-btn" (click)="addPosition()">Add Position</button>
      </div>

      <div *ngIf="error" class="alert">{{ error }}</div>
      <div class="form-actions">
  <button type="submit" class="btn btn-primary">
    Save Election
  </button>

  <button type="button" class="btn btn-secondary" (click)="closeModal()">
    Cancel
  </button>
</div>
    </form>
  </div>
</div>
