<div class="row">
  <label>START-DATETIME:</label>
  <input
    type="datetime-local"
    class="datetime-input"
    [(ngModel)]="startDateTime"
    (ngModelChange)="onStartDateTimeChange($event)"
  />
</div>

<div class="row">
  <label>END-DATETIME:</label>
  <input
    type="datetime-local"
    class="datetime-input"
    [(ngModel)]="endDateTime"
    (ngModelChange)="onEndDateTimeChange($event)"
  />
</div>
