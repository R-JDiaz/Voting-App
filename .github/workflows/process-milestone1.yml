name: Milestone Monitor

on:
  schedule:
    - cron: "0 */2 * * *"  # runs every 2 hours
  workflow_dispatch:

permissions:
  issues: write
  actions: write

jobs:
  milestone-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Analyze Milestones
        id: report
        uses: actions/github-script@v8
        with:
          script: |
            const now = new Date();

            function transformDate(dateStr) {
              const [mm, dd, yyyy] = dateStr.split("-").map(Number);
              return new Date(Date.UTC(yyyy, mm - 1, dd));
            }

            function normalizeDate(d) {
              return new Date(Date.UTC(
                d.getUTCFullYear(),
                d.getUTCMonth(),
                d.getUTCDate()
              ));
            }

            function extractDate(label, body) {
              const match = body.match(new RegExp(`${label}:\\s*(\\d{2}-\\d{2}-\\d{4})`));
              return match ? transformDate(match[1]) : null;
            }

            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all"
            });

            let report = [];
            let shouldSend = false;

            // ===============================
            // MAIN LOOP
            // ===============================
            for (const m of milestones.data) {

              // Skip closed milestones (we only process open ones first)
              if (m.state !== "open") continue;

              const body = m.description || "";

              const endMatch = body.match(/END-DATE:\s*(\d{2}-\d{2}-\d{4})/);
              if (!endMatch) continue;

              const endDate = transformDate(endMatch[1]);

              // buffer (end of day + 2 hours)
              const endOfDayUTC = new Date(endDate.getTime() + (24 * 60 * 60 * 1000) - 1);
              const endWithBuffer = new Date(endOfDayUTC.getTime() + 2 * 60 * 60 * 1000);

              // ===============================
              // OVERDUE CHECK
              // ===============================
              if (now > endWithBuffer) {

                const issues = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  milestone: m.number,
                  state: "all"
                });

                const openIssues = issues.data.filter(i => i.state === "open");

                const format = (list) =>
                  list.length
                    ? list.map(i => `#${i.number} - ${i.title}`).join("\n")
                    : "None";

                const diffHours = Math.floor((now - endWithBuffer) / (1000 * 60 * 60));

                if (openIssues.length > 0) {
                  report.push(`⏰ OVERDUE Milestone: ${m.title}`);
                  report.push(`Late by: ${diffHours} hour(s)`);
                  report.push(`OPEN ISSUES:\n${format(openIssues)}`);

                  shouldSend = true;

                  for (const issue of openIssues) {
                    try {
                      await github.rest.issues.addLabels({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issue.number,
                        labels: ["backlog"]
                      });
                    } catch (err) {
                      core.warning(`Failed to label #${issue.number}`);
                    }
                  }

                } else {
                  // ===============================
                  // CLOSE COMPLETED MILESTONE
                  // ===============================
                  await github.rest.issues.updateMilestone({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    milestone_number: m.number,
                    state: "closed"
                  });

                  report.push(`✅ Milestone Closed: ${m.title}`);

                  const closedEndDate = extractDate("END-DATE", body);
                  if (!closedEndDate) continue;

                  const targetStart = new Date(closedEndDate);
                  targetStart.setUTCDate(targetStart.getUTCDate() + 1);
                  const normalizedTarget = normalizeDate(targetStart);

                  // ===============================
                  // CHECK NEXT MILESTONE
                  // ===============================
                  const allMilestones = await github.rest.issues.listMilestones({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    state: "all"
                  });

                  for (const next of allMilestones.data) {

                    if (next.state !== "closed") continue;

                    const nextBody = next.description || "";

                    const nextStart = extractDate("START-DATE", nextBody);
                    const nextEnd = extractDate("END-DATE", nextBody);

                    if (!nextStart || !nextEnd) continue;

                    const normNextStart = normalizeDate(nextStart);

                    // Match START-DATE = previous END-DATE + 1 day
                    if (normNextStart.getTime() !== normalizedTarget.getTime()) continue;

                    // Ensure END-DATE has NOT passed
                    if (nextEnd < now) continue;

                    // ===============================
                    // STRICT RULE:
                    // Only open next milestone if CURRENT milestone has NO open issues
                    // ===============================
                    const currentIssues = await github.rest.issues.listForRepo({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      milestone: m.number,
                      state: "open"
                    });

                    if (currentIssues.data.length > 0) {
                      continue; // ❗ block opening
                    }

                    // Open next milestone
                    await github.rest.issues.updateMilestone({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      milestone_number: next.number,
                      state: "open"
                    });

                    report.push(`🔓 Auto-Opened: ${next.title}`);
                    shouldSend = true;
                  }
                }
              }
            }

            core.setOutput("send", shouldSend ? "true" : "false");
            core.setOutput("body", report.join("\n\n"));

      - name: Send Email
        if: steps.report.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "⏰ Milestone Report"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          body: ${{ steps.report.outputs.body }}
          content_type: text/plain