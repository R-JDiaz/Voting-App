name: Milestone Monitor

on:
  schedule:
    - cron: "0 */2 * * *"  # runs every 2 hours
  workflow_dispatch:

permissions:
  issues: write
  actions: write

jobs:
  milestone-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Analyze Milestones
        id: report
        uses: actions/github-script@v8
        with:
          script: |
            const now = new Date();

            // Normalize today in UTC (no time)
            const todayUTC = new Date(Date.UTC(
              now.getUTCFullYear(),
              now.getUTCMonth(),
              now.getUTCDate()
            ));

            let report = [];
            let shouldSend = false;

            // ✅ Same transform as other scripts
            function transformDate(dateStr) {
              const [mm, dd, yyyy] = dateStr.split("-").map(Number);
              return new Date(Date.UTC(yyyy, mm - 1, dd));
            }

            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            for (const m of milestones.data) {
              const body = m.description || "";

              // ✅ UPDATED: Extract MM-DD-YYYY
              const endMatch = body.match(/END-DATE:\s*(\d{2}-\d{2}-\d{4})/);
              if (!endMatch) continue;

              // Convert to UTC date
              const endDate = transformDate(endMatch[1]);

              // Set to end of day UTC
              const endOfDayUTC = new Date(endDate.getTime() + (24 * 60 * 60 * 1000) - 1);

              // Add 2-hour buffer
              const endWithBuffer = new Date(endOfDayUTC.getTime() + 2 * 60 * 60 * 1000);

              // ❗ Skip if NOT overdue
              if (now <= endWithBuffer) {
                continue;
              }

              // Fetch milestone issues
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                milestone: m.number,
                state: "all"
              });

              const openIssues = issues.data.filter(i => i.state === "open");

              const diffMs = now - endWithBuffer;
              const diffHours = Math.floor(diffMs / (1000 * 60 * 60));

              const format = (list) =>
                list.length
                  ? list.map(i => `#${i.number} - ${i.title}`).join("\n")
                  : "None";

              // 🔴 CASE 1: OVERDUE with open issues
              if (openIssues.length > 0) {
                report.push(`⏰ OVERDUE Milestone: ${m.title}`);
                report.push(`Late by: ${diffHours} hour(s)`);
                report.push(`OPEN ISSUES:\n${format(openIssues)}`);

                shouldSend = true;

                // Add backlog label
                for (const issue of openIssues) {
                  try {
                    await github.rest.issues.addLabels({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      labels: ["backlog"]
                    });
                  } catch (err) {
                    core.warning(`Failed to add label to issue #${issue.number}`);
                  }
                }

                continue;
              }

              // 🟢 CASE 2: OVERDUE but NO open issues
              if (openIssues.length === 0) {
                await github.rest.issues.updateMilestone({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  milestone_number: m.number,
                  state: "closed"
                });

                report.push(`✅ Milestone Closed Automatically: ${m.title}`);

                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: "process-milestone2.yml",
                  ref: "main"
                });
              }
            }

            core.setOutput("send", shouldSend ? "true" : "false");
            core.setOutput("body", report.join("\n\n"));

      - name: Send Email
        if: steps.report.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "⏰ Overdue Milestone Alert"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          body: ${{ steps.report.outputs.body }}
          content_type: text/plain