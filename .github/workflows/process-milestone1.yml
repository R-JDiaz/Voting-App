name: Milestone Monitor

on:
  schedule:
    - cron: "0 */2 * * *"  # runs every 2 hours
  workflow_dispatch:

permissions:
  issues: write
  actions: write

jobs:
  milestone-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Analyze Milestones
        id: report
        uses: actions/github-script@v8
        with:
          script: |
            const now = new Date();
            let report = [];
            let shouldSend = false;

            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            for (const m of milestones.data) {
              const body = m.description || "";

              // Extract End date
              const endMatch = body.match(/END-DATE:\s*(\d{4}-\d{2}-\d{2})/);
              if (!endMatch) continue;

              // Safer date parsing (end of day UTC)
              const endDate = new Date(`${endMatch[1]}T23:59:59Z`);

              // Add 2-hour buffer
              const endWithBuffer = new Date(endDate.getTime() + 2 * 60 * 60 * 1000);

              // ❗ SKIP if NOT overdue (your requirement)
              if (now <= endWithBuffer) {
                continue;
              }

              // Overdue milestone logic
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                milestone: m.number,
                state: "all"
              });

              const openIssues = issues.data.filter(i => i.state === "open");

              const diffMs = now - endWithBuffer;
              const diffHours = Math.floor(diffMs / (1000 * 60 * 60));

              const format = (list) =>
                list.length
                  ? list.map(i => `#${i.number} - ${i.title}`).join("\n")
                  : "None";

              // CASE 1: OVERDUE with open issues
              if (openIssues.length > 0) {
                report.push(`⏰ OVERDUE Milestone: ${m.title}`);
                report.push(`Late by: ${diffHours} hour(s)`);
                report.push(`OPEN ISSUES:\n${format(openIssues)}`);

                shouldSend = true;

                // Add backlog label to open issues
                for (const issue of openIssues) {
                  try {
                    await github.rest.issues.addLabels({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      labels: ["backlog"]
                    });
                  } catch (err) {
                    core.warning(`Failed to add label to issue #${issue.number}`);
                  }
                }

                continue;
              }

              // CASE 2: OVERDUE but NO open issues → close milestone
              if (openIssues.length === 0) {
                await github.rest.issues.updateMilestone({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  milestone_number: m.number,
                  state: "closed"
                });

                report.push(`✅ Milestone Closed Automatically: ${m.title}`);

                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: "process-milestone2.yml",
                  ref: "main"
                });
              }
            }

            core.setOutput("send", shouldSend ? "true" : "false");
            core.setOutput("body", report.join("\n\n"));

      - name: Send Email
        if: steps.report.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "⏰ Overdue Milestone Alert"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          body: ${{ steps.report.outputs.body }}
          content_type: text/plain
