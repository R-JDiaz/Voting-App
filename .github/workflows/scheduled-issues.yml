name: Scheduled Issues Auto-Opener

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  open-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Process scheduled issues
        id: process
        uses: actions/github-script@v8
        with:
          script: |
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "closed",
                labels: ["scheduled"]
              }
            );

            // Use UTC "today" (no time component)
            const now = new Date();
            const todayUTC = new Date(Date.UTC(
              now.getUTCFullYear(),
              now.getUTCMonth(),
              now.getUTCDate()
            ));

            let openedIssues = [];

            // ✅ FIXED: MM-DD-YYYY → UTC Date (YYYY-MM-DD internally)
            function transformDate(dateStr) {
              const [mm, dd, yyyy] = dateStr.split("-").map(Number);
              return new Date(Date.UTC(yyyy, mm - 1, dd));
            }

            for (const issue of issues) {
              const body = issue.body || "";

              // Extract START-DATE
              const startMatch = body.match(/START-DATE:\s*(\d{2}-\d{2}-\d{4})/);
              if (!startMatch) continue;

              const startDate = transformDate(startMatch[1]);

              // Extract END-DATE (optional)
              const endMatch = body.match(/END-DATE:\s*(\d{2}-\d{2}-\d{4})/);
              let endDate = null;
              if (endMatch) {
                endDate = transformDate(endMatch[1]);
              }

              // ✅ Date validation (UTC-safe)
              const isStartValid = todayUTC >= startDate;
              const isEndValid = !endDate || todayUTC <= endDate;

              if (isStartValid && isEndValid) {
                console.log(`Opening issue #${issue.number}`);

                // Open issue
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: "open"
                });

                // Add "active" label
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ["active"]
                });

                // Remove "scheduled" label
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: "scheduled"
                  });
                } catch (err) {
                  console.log("Scheduled label already removed or not found");
                }

                openedIssues.push(`#${issue.number} - ${issue.title}`);
              }
            }

            core.setOutput("openedIssues", JSON.stringify(openedIssues));

      - name: Send summary email
        if: steps.process.outputs.openedIssues != '[]'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "GitHub Issue Scheduler Summary"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          body: |
            📢 Summary of opened issues:

            ${{ join(fromJson(steps.process.outputs.openedIssues), '\n') }}