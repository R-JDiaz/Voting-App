name: Process Closed Milestones

on:
  repository_dispatch:
    types: [process-milestones]

permissions:
  issues: write
  actions: write

jobs:
  process-closed-milestones:
    runs-on: ubuntu-latest

    steps:
      - name: Analyze Closed Milestones
        id: process
        uses: actions/github-script@v8
        with:
          script: |
            const now = new Date();

            // Normalize today (UTC)
            const todayUTC = new Date(Date.UTC(
              now.getUTCFullYear(),
              now.getUTCMonth(),
              now.getUTCDate()
            ));

            let report = [];
            let shouldSend = false;

            // Convert MM-DD-YYYY → UTC Date
            function transformDate(dateStr) {
              const [mm, dd, yyyy] = dateStr.split("-").map(Number);
              return new Date(Date.UTC(yyyy, mm - 1, dd));
            }

            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "closed"
            });

            for (const m of milestones.data) {
              const body = m.description || "";

              // Extract both dates (MM-DD-YYYY)
              const startMatch = body.match(/START-DATE:\s*(\d{2}-\d{2}-\d{4})/);
              const endMatch = body.match(/END-DATE:\s*(\d{2}-\d{2}-\d{4})/);

              if (!startMatch || !endMatch) continue;

              const startDate = transformDate(startMatch[1]);
              const endDate = transformDate(endMatch[1]);

              // ❗ Condition:
              // START-DATE must be in the future
              // END-DATE must NOT have passed

              if (todayUTC < startDate) continue;
              if (todayUTC > endDate) continue;

              // Reopen milestone
              await github.rest.issues.updateMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                milestone_number: m.number,
                state: "open"
              });

              report.push(`🔄 Reopened Milestone: ${m.title}`);
              report.push(`START-DATE: ${startMatch[1]}`);
              report.push(`END-DATE: ${endMatch[1]}`);

              shouldSend = true;

              break;
            }

            core.setOutput("send", shouldSend ? "true" : "false");
            core.setOutput("body", report.join("\n\n"));

      - name: Send Email
        if: steps.process.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🔄 Milestone Reopened Notification"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          body: ${{ steps.process.outputs.body }}
