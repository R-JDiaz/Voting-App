jobs:
  process-closed-milestones:
    runs-on: ubuntu-latest

    steps:
      - name: Analyze Closed Milestones
        id: process
        uses: actions/github-script@v8
        with:
          script: |
            const now = new Date();

            const todayUTC = new Date(Date.UTC(
              now.getUTCFullYear(),
              now.getUTCMonth(),
              now.getUTCDate()
            ));

            let report = [];
            let shouldSend = false;

            function transformDate(dateStr) {
              const [yyyy, mm, dd] = dateStr.split("-").map(Number);
              return new Date(Date.UTC(yyyy, mm - 1, dd));
            }

            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "closed"
            });

            for (const m of milestones.data) {
              const body = m.description || "";

              const startMatch = body.match(/START-DATE:\s*(\d{4}-\d{2}-\d{2})/);
              if (!startMatch) continue;

              const startDate = transformDate(startMatch[1]);

              if (todayUTC >= startDate) {
                continue;
              }

              await github.rest.issues.updateMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                milestone_number: m.number,
                state: "open"
              });

              report.push(`🔄 Reopened Milestone: ${m.title}`);
              report.push(`Start Date: ${startMatch[1]}`);

              shouldSend = true;

              break;
            }

            core.setOutput("send", shouldSend ? "true" : "false");
            core.setOutput("body", report.join("\n\n"));

      - name: Send Email
        if: steps.process.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🔄 New Milestone Open Notification"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          body: ${{ steps.process.outputs.body }}
          content_type: text/plain